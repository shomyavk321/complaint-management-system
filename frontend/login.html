<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — UniComplain</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="dark"] {
            --bg: #0a0a0a;
            --surface: #1a1a1a;
            --border: #2a2a2a;
            --text: #f0ece4;
            --text-muted: #6b6b6b;
            --accent: #e8d5b0;
            --accent2: #c4a882;
            --btn-text: #0a0a0a;
            --input-bg: #111111;
            --error: #e07070;
        }
        :root[data-theme="light"] {
            --bg: #f5f2ec;
            --surface: #ffffff;
            --border: #d8d3c8;
            --text: #1a1a1a;
            --text-muted: #8a8070;
            --accent: #2a2a2a;
            --accent2: #5a4a3a;
            --btn-text: #f5f2ec;
            --input-bg: #f5f2ec;
            --error: #c0392b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
            transition: background 0.4s, color 0.4s;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1000;
            opacity: 0.4;
        }

        .left-panel {
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 48px 60px;
            position: relative;
            overflow: hidden;
        }

        .left-panel::after {
            content: '';
            position: absolute;
            bottom: -100px;
            left: -100px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--accent2) 0%, transparent 70%);
            opacity: 0.08;
            pointer-events: none;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
        }

        .logo span { color: var(--accent2); }

        .left-content { flex: 1; display: flex; flex-direction: column; justify-content: center; }

        .role-indicator {
            display: inline-block;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 100px;
            margin-bottom: 32px;
        }

        .left-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 4vw, 4rem);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -0.03em;
            margin-bottom: 20px;
        }

        .left-content h2 em { font-style: italic; color: var(--accent2); }

        .left-content p {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.7;
            font-weight: 300;
            max-width: 360px;
        }

        .left-footer {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }

        .right-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 48px 80px;
        }

        .top-bar {
            position: absolute;
            top: 48px;
            right: 60px;
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .theme-toggle {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 18px;
            border-radius: 100px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            transition: all 0.3s;
        }

        .theme-toggle:hover {
            background: var(--accent);
            color: var(--btn-text);
            border-color: var(--accent);
        }

        .form-header { margin-bottom: 48px; }

        .form-header h3 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .form-header p {
            font-size: 14px;
            color: var(--text-muted);
        }

        .form-group { margin-bottom: 24px; }

        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 400;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus { border-color: var(--accent2); }
        input::placeholder { color: var(--text-muted); }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: var(--btn-text);
            border: none;
            border-radius: 4px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .submit-btn:hover { opacity: 0.85; transform: translateY(-1px); }
        .submit-btn:active { transform: translateY(0); }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s;
        }

        .back-link:hover { color: var(--text); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .right-panel > * {
            animation: fadeUp 0.5s ease forwards;
            opacity: 0;
        }

        .form-header { animation-delay: 0.1s; }
        .form-group:nth-child(1) { animation-delay: 0.2s; }
        .form-group:nth-child(2) { animation-delay: 0.25s; }
        .submit-btn { animation-delay: 0.3s; }
        .back-link { animation-delay: 0.35s; }

        @media (max-width: 768px) {
            body { grid-template-columns: 1fr; }
            .left-panel { display: none; }
            .right-panel { padding: 48px 32px; }
            .top-bar { top: 24px; right: 24px; }
        }
    </style>
</head>
<body>
    <div class="left-panel">
        <a href="index.html" class="logo">Uni<span>Complain</span></a>
        <div class="left-content">
            <span class="role-indicator" id="role-label">Student Portal</span>
            <h2>Welcome<br><em>Back.</em></h2>
            <p>Sign in to access your dashboard, submit complaints, and track their resolution status.</p>
        </div>
        <div class="left-footer">
            <span>© 2026 UniComplain</span>
            <span>Secure · Private</span>
        </div>
    </div>

    <div class="right-panel">
        <div class="top-bar">
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">☀ Light</button>
        </div>
        <div class="form-header">
            <h3 id="login-title">Sign In</h3>
            <p>Enter your credentials to continue</p>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="you@university.edu">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button class="submit-btn" onclick="handleLogin()">
            Continue <span>→</span>
        </button>
        <a href="index.html" class="back-link">← Back to Home</a>
    </div>

    <script src="app.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const role = params.get('role') || 'student';
        const roleNames = { student: 'Student Portal', teacher: 'Faculty Access', admin: 'Admin Console' };
        document.getElementById('role-label').textContent = roleNames[role] || 'Portal';
        document.getElementById('login-title').textContent = 'Sign In';

        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.getElementById('themeBtn');
            if (html.getAttribute('data-theme') === 'dark') {
                html.setAttribute('data-theme', 'light');
                btn.textContent = '☾ Dark';
                localStorage.setItem('theme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                btn.textContent = '☀ Light';
                localStorage.setItem('theme', 'dark');
            }
        }

        const saved = localStorage.getItem('theme');
        if (saved) {
            document.documentElement.setAttribute('data-theme', saved);
            document.getElementById('themeBtn').textContent = saved === 'light' ? '☾ Dark' : '☀ Light';
        }
    </script>
</body>
</html>
